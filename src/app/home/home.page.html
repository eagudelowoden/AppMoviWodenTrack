<ion-content [fullscreen]="true" class="login-content">
  <div class="login-screen">
    <!-- ══ ZONA OSCURA — Navy + malla ═══════════════════════════════════════ -->
    <div class="login-top">

      <!-- Chip de nueva versión — esquina superior derecha -->
      <div class="update-chip" *ngIf="hasNewVersion">
        <ion-icon name="megaphone-outline"></ion-icon>
        <span>v{{ newVersion }} disponible</span>
      </div>
      <!-- Marca -->
      <div class="brand">
        <div class="brand-icon">
          <ion-icon name="shield-checkmark"></ion-icon>
        </div>
        <div class="brand-text">
          <span class="b-woden">Woden</span><span class="b-track">Track</span>
        </div>
      </div>

      <!-- Subtítulo -->
      <p class="login-sub">Sistema de Asistencias</p>
    </div>

    <!-- ══ HOJA BLANCA — Formulario ═════════════════════════════════════════ -->
    <div class="login-bottom">
      <h2 class="form-title">Iniciar sesión</h2>

      <!-- Usuario -->
      <div class="field-wrap">
        <div class="field-icon">
          <ion-icon name="person-outline"></ion-icon>
        </div>
        <ion-input
          class="field-input"
          type="text"
          placeholder="Usuario"
          [(ngModel)]="userForm.usuario"
          autocomplete="username"
        >
        </ion-input>
      </div>

      <!-- Contraseña -->
      <div class="field-wrap">
        <div class="field-icon">
          <ion-icon name="lock-closed-outline"></ion-icon>
        </div>
        <ion-input
          class="field-input"
          [type]="showPassword ? 'text' : 'password'"
          placeholder="Contraseña"
          [(ngModel)]="userForm.password"
          autocomplete="current-password"
        >
        </ion-input>
        <button class="eye-btn" (click)="togglePassword()">
          <ion-icon
            [name]="showPassword ? 'eye-off-outline' : 'eye-outline'"
          ></ion-icon>
        </button>
      </div>

      <!-- Botón ingresar -->
      <button class="btn-ingresar" (click)="ingresar()">Ingresar</button>

      <p class="version-label">WodenTrack Pro · v{{ appVersion }}</p>
    </div>
  </div>
</ion-content>
