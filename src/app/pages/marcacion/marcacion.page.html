<ion-content [fullscreen]="true" class="woden-content">

  <!-- Pull-to-refresh -->
  <ion-refresher slot="fixed" (ionRefresh)="handleRefresh($event)">
    <ion-refresher-content
      pullingIcon="chevron-down-outline"
      pullingText="Desliza para actualizar"
      refreshingSpinner="crescent"
      refreshingText="Actualizando...">
    </ion-refresher-content>
  </ion-refresher>

  <div class="wt-screen">

    <!-- ══ SECCIÓN SUPERIOR — Navy + malla ══════════════════════════════════ -->
    <div class="wt-top">

      <!-- Chip sutil de actualización — esquina superior derecha -->
      <div class="update-chip" *ngIf="apkInfo && showUpdateBanner" (click)="downloadUpdate()">
        <ion-icon name="megaphone-outline"></ion-icon>
        <span>v{{ apkInfo.version }} disponible</span>
        <button class="chip-dismiss" (click)="$event.stopPropagation(); dismissUpdate()">
          <ion-icon name="close-outline"></ion-icon>
        </button>
      </div>

      <!-- Encabezado -->
      <div class="wt-header">
        <div class="wt-brand"><span class="b-woden">Woden</span><span class="b-track">Track</span></div>
        <div class="header-right">
          <div class="conn-pill" [class.offline]="!isOnline">
            <span class="conn-dot"></span>
            <span>{{ isOnline ? 'Online' : 'Offline' }}</span>
          </div>
          <button class="icon-btn" (click)="logout()">
            <ion-icon name="log-out-outline"></ion-icon>
          </button>
        </div>
      </div>

      <!-- Saludo + Reloj -->
      <div class="wt-hero">
        <p class="greeting">¡Hola, {{ primerNombre }}!</p>
        <div class="clock-row">
          <span class="clock-h">{{ timeOnly }}</span>
          <span class="clock-ap">{{ ampm }}</span>
        </div>
        <p class="wt-date">{{ fecha }}</p>
        <div class="badge-done" *ngIf="dayCompleted">
          <ion-icon name="checkmark-circle-outline"></ion-icon> Jornada Finalizada
        </div>
      </div>

    </div>

    <!-- ══ SECCIÓN INFERIOR — Hoja blanca ════════════════════════════════════ -->
    <div class="wt-bottom">

      <!-- Malla del día -->
      <div class="malla-card" *ngIf="mallaHoy?.tiene_malla">
        <div class="m-icon"><ion-icon name="calendar-outline"></ion-icon></div>
        <div class="m-data">
          <span class="m-lbl">Mi horario hoy</span>
          <span class="m-nom">{{ mallaHoy.nombre }}</span>
        </div>
        <div class="m-chips">
          <span class="chip" *ngFor="let t of mallaHoy.turnos">{{ t.entrada }}–{{ t.salida }}</span>
        </div>
      </div>

      <!-- Acciones secundarias -->
      <div class="secondary-row">
        <button class="sec-btn" (click)="verMarcacion()">
          <ion-icon name="eye-outline"></ion-icon>
          <span>Ver marcación</span>
        </button>
        <button class="sec-btn sec-danger" (click)="reportarFalla()">
          <ion-icon name="bug-outline"></ion-icon>
          <span>Reportar falla</span>
        </button>
      </div>

      <!-- Separador -->
      <div class="divider"><span class="dl"></span><span class="dt">Marcar asistencia</span><span class="dl"></span></div>

      <!-- Botones principales -->
      <div class="action-btns">
        <button class="pill-btn pill-in"
          [disabled]="isInside || dayCompleted || !isOnline || isMarking"
          (click)="realizarMarcacion('in')">
          <div class="p-icon"><ion-icon name="log-in-outline"></ion-icon></div>
          <div class="p-text">
            <span class="p-lbl">{{ isInside ? 'Ingresaste' : (dayCompleted ? 'Completo' : 'Entrada') }}</span>
            <span class="p-time" *ngIf="horaEntrada">{{ horaEntrada }}</span>
          </div>
        </button>

        <button class="pill-btn pill-out"
          [disabled]="!isInside || dayCompleted || !isOnline || isMarking"
          (click)="realizarMarcacion('out')">
          <div class="p-icon"><ion-icon name="log-out-outline"></ion-icon></div>
          <div class="p-text">
            <span class="p-lbl">{{ dayCompleted ? 'Finalizado' : 'Salida' }}</span>
            <span class="p-time" *ngIf="horaSalida">{{ horaSalida }}</span>
          </div>
        </button>
      </div>

      <p class="wt-footer">WodenTrack Pro · {{ currentYear }}</p>

    </div>
  </div>

</ion-content>
